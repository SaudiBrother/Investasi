<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Belajar Investasi | Strategi Keuangan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.2s ease;
            line-height: 1.5;
        }

        /* Theme Variabel */
        :root {
            --bg-primary: #FEF9F0;
            --bg-secondary: #FFFFFF;
            --text-primary: #1E2A2F;
            --text-secondary: #4A5B5E;
            --accent-green: #2C6E49;
            --accent-green-light: #4C9A6F;
            --accent-gold: #D4AF37;
            --border-light: #E2DFD5;
            --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
            --tab-bg: #FFFFFFCC;
        }

        body.dark {
            --bg-primary: #121212;
            --bg-secondary: #1E2A2F;
            --text-primary: #EFF3F0;
            --text-secondary: #B0C4C2;
            --accent-green: #6ABF8A;
            --accent-green-light: #8ED4A3;
            --border-light: #2C3E3A;
            --card-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            --tab-bg: #1E2A2FCC;
        }

        .app-container {
            max-width: 880px;
            margin: 0 auto;
            padding: 1.5rem 1.5rem 4rem;
            position: relative;
        }

        /* Pages */
        .page {
            display: none;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.45s cubic-bezier(0.2, 0.9, 0.4, 1.1), transform 0.45s ease;
        }

        .page.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Typography */
        h1, h2, h3 {
            font-weight: 600;
            letter-spacing: -0.01em;
            margin: 1.5em 0 0.75em;
        }

        h1 { font-size: 2rem; margin-top: 0.2em; }
        h2 { font-size: 1.7rem; border-left: 5px solid var(--accent-green); padding-left: 1rem; margin: 1.2em 0 0.8em; }
        h3 { font-size: 1.3rem; color: var(--accent-green); margin-top: 1.2em; }
        p, li {
            color: var(--text-secondary);
            margin-bottom: 1rem;
            line-height: 1.6;
        }

        .content-card {
            background: var(--bg-secondary);
            border-radius: 28px;
            padding: 1.8rem 2rem;
            box-shadow: var(--card-shadow);
            margin: 1rem 0 2rem;
        }

        /* HOMEPAGE */
        .home-screen {
            min-height: 70vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .hero-title {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D4AF37, #B8860B);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: breathe 3s infinite ease-in-out;
            margin-bottom: 1rem;
        }
        @keyframes breathe {
            0% { transform: scale(1); opacity: 0.9; letter-spacing: -0.01em; }
            50% { transform: scale(1.06); opacity: 1; text-shadow: 0 0 15px rgba(212,175,55,0.4); }
            100% { transform: scale(1); opacity: 0.9; }
        }
        .start-btn {
            background: #2C6E49;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 2rem;
        }
        .start-btn:hover {
            background: #4C9A6F;
            transform: translateY(-3px);
            box-shadow: 0 8px 18px rgba(44,110,73,0.3);
        }

        /* Canvas chart background */
        .chart-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
            opacity: 0.2;
        }

        /* Buttons & Navigasi */
        .btn-nav {
            background: var(--accent-green);
            color: white;
            border: none;
            padding: 0.8rem 1.8rem;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s;
        }
        .btn-nav:hover {
            background: var(--accent-green-light);
            padding: 0.8rem 2.2rem;
        }
        .next-section {
            margin-top: 3rem;
            text-align: center;
        }

        /* Tabs */
        .tab-widget {
            background: var(--tab-bg);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            margin: 2rem 0;
            border: 1px solid var(--border-light);
            overflow: hidden;
        }
        .tab-headers {
            display: flex;
            gap: 0.5rem;
            background: var(--bg-secondary);
            padding: 0.8rem 1rem 0;
            border-bottom: 1px solid var(--border-light);
            flex-wrap: wrap;
        }
        .tab-btn {
            background: none;
            border: none;
            padding: 0.5rem 1.2rem;
            font-weight: 600;
            border-radius: 40px;
            cursor: pointer;
            transition: 0.2s;
            color: var(--text-secondary);
        }
        .tab-btn.active {
            background: var(--accent-green);
            color: white;
        }
        .tab-content {
            padding: 1.5rem;
        }
        .tab-pane {
            display: none;
        }
        .tab-pane.active-pane {
            display: block;
        }

        /* Menu & sidebar */
        .top-controls {
            position: fixed;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 12px;
            z-index: 1100;
        }
        .icon-circle {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            font-size: 1.3rem;
        }
        .menu-icon {
            width: 22px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            transition: all 0.5s ease;
        }
        .menu-icon span {
            height: 2.5px;
            background: var(--text-primary);
            border-radius: 4px;
            transition: 0.4s;
        }
        .menu-circle.morph-circle .menu-icon span {
            background: white;
        }
        .menu-circle.morph-circle {
            background: var(--accent-green);
            transform: scale(0.9);
        }
        .menu-circle.morph-circle .menu-icon span:nth-child(1) {
            transform: rotate(45deg) translate(5px, 5px);
        }
        .menu-circle.morph-circle .menu-icon span:nth-child(2) {
            opacity: 0;
        }
        .menu-circle.morph-circle .menu-icon span:nth-child(3) {
            transform: rotate(-45deg) translate(5px, -5px);
        }
        .sidebar {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            height: 100vh;
            background: var(--bg-secondary);
            z-index: 1150;
            transition: right 0.35s cubic-bezier(0.2,0.9,0.4,1.1);
            padding: 5rem 1.5rem 2rem;
            box-shadow: -5px 0 25px rgba(0,0,0,0.2);
            border-left: 1px solid var(--border-light);
            overflow-y: auto;
        }
        .sidebar.open { right: 0; }
        .sidebar ul { list-style: none; }
        .sidebar li { margin: 1.2rem 0; }
        .sidebar a {
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            display: block;
            padding: 0.5rem 0;
            border-bottom: 1px dashed transparent;
            transition: 0.2s;
        }
        .sidebar a:hover { color: var(--accent-green); border-bottom-color: var(--accent-green); }
        .overlay-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(3px);
            z-index: 1120;
            display: none;
        }
        .overlay-menu.show { display: block; }

        /* Responsive */
        @media (max-width: 640px) {
            .app-container { padding: 1rem; }
            .hero-title { font-size: 2.2rem; }
            .content-card { padding: 1.2rem; }
        }
    </style>
</head>
<body>
    <canvas id="chartCanvas" class="chart-bg"></canvas>
    <div class="top-controls">
        <div class="icon-circle" id="themeToggle">🌙</div>
        <div class="icon-circle menu-circle" id="menuToggle">
            <div class="menu-icon">
                <span></span><span></span><span></span>
            </div>
        </div>
    </div>
    <div class="overlay-menu" id="overlayMenu"></div>
    <div class="sidebar" id="sidebar">
        <ul id="chapterList"></ul>
    </div>

    <div class="app-container" id="app">
        <!-- Home -->
        <div id="homePage" class="page active">
            <div class="home-screen">
                <div class="hero-title">Belajar Investasi</div>
                <p style="max-width: 500px; margin: 0.5rem auto;">Rekonstruksi Paradigma Keuangan : Strategi Investasi, Manajemen Risiko, dan Akumulasi Kekayaan</p>
                <button class="start-btn" id="startBtn">Mulai Pelajari →</button>
            </div>
        </div>
        <!-- dynamic pages container -->
        <div id="pendahuluan" class="page"></div>
        <div id="bab1" class="page"></div>
        <div id="bab2" class="page"></div>
        <div id="bab3" class="page"></div>
        <div id="bab4" class="page"></div>
        <div id="bab5" class="page"></div>
        <div id="bab6" class="page"></div>
        <div id="bab7" class="page"></div>
        <div id="kesimpulan" class="page"></div>
    </div>

    <script>
        // ======================= DATA JSON (embedded) =======================
        const contentData = {
            pendahuluan: `<div class="content-card"><h1>📖 Fondasi Filosofis & Biologis</h1><p>Investasi adalah keharusan eksistensial. Manusia sebagai aset terdepresiasi: tenaga dan kesehatan menurun seiring usia. Jika hanya mengandalkan gaji, Anda mempertaruhkan masa depan. Inflasi adalah musuh laten: daya beli uang bocor perlahan.</p><p>Contoh: Harga bakso di Indonesia: 1990 = Rp200, 2000 = Rp2.000, 2022 = Rp20.000. Uang tidur akan meleleh.</p><div class="tab-widget"><div class="tab-headers"><button class="tab-btn active" data-tab="0">1990</button><button class="tab-btn" data-tab="1">2000</button><button class="tab-btn" data-tab="2">2022</button></div><div class="tab-content"><div class="tab-pane active-pane" data-pane="0">🥣 Harga bakso Rp200 → daya beli tinggi</div><div class="tab-pane" data-pane="1">🥣 Harga Rp2.000 → daya beli turun 10x</div><div class="tab-pane" data-pane="2">🥣 Harga Rp20.000 → bukti inflasi akut</div></div></div><p>Investasi = membeli kembali waktu Anda di masa depan.</p></div>`,
            bab1: `<div class="content-card"><h2>⚔️ Manajemen Risiko: Benteng & Parit</h2><p>Bayangkan Anda komandan dengan 30 juta prajurit (rupiah). Jangan kirim semua ke medan perang! Bagi pasukan: Dana Darurat (benteng), Asuransi (perisai), Saham (pengintai), Emas (cadangan).</p><p>Dana darurat ideal: belum menikah 3-6x pengeluaran, menikah 6x, beranak 9-12x. Asuransi mentransfer risiko besar.</p>#tab\nPerbandingan Strategi Risiko|Tanpa Proteksi|Dengan Proteksi\nDampak sakit kritis|Bangkrut total|Klaim asuransi, tabungan aman\nKehilangan pekerjaan|Jual aset rugi|Dana darurat 6 bulan</div>`,
            bab2: `<div class="content-card"><h2>📊 Alokasi Aset: Emas, Saham & Formasi Sepak Bola</h2><p>Emas = penjaga benteng (lindung nilai, 5-10% portofolio). Saham = mesin pertumbuhan (return historis ~10% per tahun). Kombinasi kiper (pasar uang), bek (obligasi), gelandang (emas), penyerang (saham) menciptakan keseimbangan.</p>#tab\nPerbandingan Aset|Peran|Risiko|Return jangka panjang\nEmas|Lindung nilai|Rendah|~7-8% historis\nSaham|Pertumbuhan|Tinggi|~10%+</div>`,
            bab3: `<div class="content-card"><h2>⏳ Kekuatan Waktu: Bunga Majemuk</h2><p>Compound interest = keajaiban dunia kedelapan. Sally mulai 20 tahun (invest 10 tahun lalu diam) vs Mike mulai 40 tahun (invest 20 tahun). Hasil akhir Sally jauh lebih besar karena waktu.</p>#tab\nPerbandingan Sally vs Mike|Usia Mulai|Total Modal|Kekayaan usia 60\nSally|20 Tahun|Rp120jt|~Rp7 M\nMike|40 Tahun|Rp240jt|~Rp700jt\n<p>Mulai sekarang, sekecil apapun, waktu adalah aset tak tergantikan.</p></div>`,
            bab4: `<div class="content-card"><h2>🧠 Psikologi Investor: Marshmallow & Noise</h2><p>Kemampuan menunda kepuasan (delayed gratification) kunci sukses. Bedakan Noise (fluktuasi harian) vs Signal (fundamental bisnis). Investor bijak fokus pada long-term signal.</p>#tab\nNoise vs Signal|Karakteristik|Respon Bijak\nNoise|Fluktuasi harian, emosi|Diabaikan\nSignal|Kinerja bisnis nyata|Evaluasi tahunan</div>`,
            bab5: `<div class="content-card"><h2>🏛️ Piramida Keuangan Indonesia</h2><p>Lapisan 1: Cashflow positif, dana darurat. Lapisan 2: Asuransi. Lapisan 3: Investasi (saham, emas, reksadana). Lapisan 4: Distribusi & pensiun. Jangan lompat ke investasi sebelum fondasi kokoh.</p>#tab\nTingkatan Piramida|Prioritas Utama|Indikator Keberhasilan\nDasar Bawah|Cashflow & Dana Darurat|Arus kas surplus + dana darurat penuh\nDasar Atas|Proteksi (Asuransi)|Premi terbayar\nTengah|Investasi Tujuan|Target tercapai\nAtas|Dana Pensiun|Passive income > pengeluaran</div>`,
            bab6: `<div class="content-card"><h2>📐 Implementasi: Bayar Diri Sendiri & 50/30/20</h2><p>Prinsip: Pendapatan - Investasi = Pengeluaran. Sisihkan 10-20% langsung saat gaji masuk. Metode 50/30/20: 50% kebutuhan, 30% keinginan, 20% tabungan & investasi.</p><p>Konsistensi lebih penting daripada sekali besar.</p></div>`,
            bab7: `<div class="content-card"><h2>🔥 Konsistensi & Kedisiplinan</h2><p>Investasi bukan tentang sekali transaksi besar, melainkan rutin setiap bulan. Rp1 juta per bulan selama 10 tahun menghasilkan keajaiban compounding. Time in the market > timing the market.</p><p>Jadikan investasi kebiasaan otomatis.</p></div>`,
            kesimpulan: `<div class="content-card"><h2>✨ Menjadi AI bagi Hidup Sendiri</h2><p>Investasi adalah bentuk penghargaan pada diri masa depan. Kebebasan sejati = banyak pilihan, bukan barang mewah. Mulailah hari ini: berhenti memakan benih, tanam hutan Anda.</p><p style="font-style:italic;">"Aku peduli padamu, maka aku berinvestasi sekarang."</p></div>`
        };

        // Helper: render Tab dari marker #tab
        function renderTabFromMarker(html) {
            const regex = /#tab\s*\n([\s\S]*?)(?=\n\n|\n<\/div>|$)/g;
            let processed = html;
            let match;
            while ((match = regex.exec(html)) !== null) {
                let raw = match[1].trim();
                let rows = raw.split('\n').filter(r => r.trim() !== '');
                if (rows.length < 2) continue;
                let headers = rows[0].split('|').map(h => h.trim());
                let tabData = [];
                for (let i = 1; i < rows.length; i++) {
                    let cols = rows[i].split('|').map(c => c.trim());
                    let obj = {};
                    headers.forEach((h, idx) => { obj[h] = cols[idx] || ''; });
                    tabData.push(obj);
                }
                let widgetId = 'tab_' + Math.random().toString(36).substr(2, 6);
                let headerHtml = `<div class="tab-headers">`;
                let paneHtml = `<div class="tab-content">`;
                headers.forEach((h, idx) => {
                    let activeClass = idx === 0 ? 'active' : '';
                    let activePane = idx === 0 ? 'active-pane' : '';
                    headerHtml += `<button class="tab-btn ${activeClass}" data-tab="${idx}">${h}</button>`;
                    let contentText = tabData.map(row => row[h]).join('<br>');
                    paneHtml += `<div class="tab-pane ${activePane}" data-pane="${idx}">${contentText}</div>`;
                });
                headerHtml += `</div>`;
                paneHtml += `</div>`;
                let widgetFull = `<div class="tab-widget">${headerHtml}${paneHtml}</div>`;
                processed = processed.replace(match[0], widgetFull);
            }
            return processed;
        }

        // attach tab event listeners
        function attachTabEvents(container) {
            container.querySelectorAll('.tab-widget').forEach(w => {
                const btns = w.querySelectorAll('.tab-btn');
                const panes = w.querySelectorAll('.tab-pane');
                btns.forEach(btn => {
                    btn.removeEventListener('click', (e) => {});
                    btn.addEventListener('click', () => {
                        let idx = btn.getAttribute('data-tab');
                        btns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        panes.forEach(p => {
                            p.classList.remove('active-pane');
                            if (p.getAttribute('data-pane') === idx) p.classList.add('active-pane');
                        });
                    });
                });
            });
        }

        function renderPage(pageId) {
            const pageDiv = document.getElementById(pageId);
            if (!pageDiv) return;
            let raw = contentData[pageId] || `<div class="content-card"><p>Konten tidak tersedia.</p></div>`;
            let processedHtml = renderTabFromMarker(raw);
            pageDiv.innerHTML = processedHtml;
            attachTabEvents(pageDiv);
            // Append tombol navigasi bawah
            const order = ['pendahuluan','bab1','bab2','bab3','bab4','bab5','bab6','bab7','kesimpulan'];
            const idx = order.indexOf(pageId);
            const nextPage = order[idx+1];
            const prevPage = order[idx-1];
            let navDiv = pageDiv.querySelector('.custom-nav');
            if (navDiv) navDiv.remove();
            const navContainer = document.createElement('div');
            navContainer.className = 'next-section custom-nav';
            if (prevPage) {
                const prevBtn = document.createElement('button');
                prevBtn.innerText = '← Sebelumnya';
                prevBtn.className = 'btn-nav';
                prevBtn.style.marginRight = '1rem';
                prevBtn.onclick = () => navigateTo(prevPage);
                navContainer.appendChild(prevBtn);
            }
            if (nextPage) {
                const nextBtn = document.createElement('button');
                nextBtn.innerText = `Lanjut ke ${nextPage === 'kesimpulan' ? 'Kesimpulan' : 'Bab ' + nextPage.slice(3)} →`;
                nextBtn.className = 'btn-nav';
                nextBtn.onclick = () => navigateTo(nextPage);
                navContainer.appendChild(nextBtn);
            }
            pageDiv.appendChild(navContainer);
        }

        // Navigation & Sidebar
        function navigateTo(pageId, pushState = true) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) {
                target.classList.add('active');
                if (!target.innerHTML.trim() || target.innerHTML.includes('Konten tidak tersedia')) renderPage(pageId);
                window.scrollTo({ top: 0, behavior: 'smooth' });
                if (pushState) history.pushState({ page: pageId }, '', `#${pageId}`);
            }
            closeSidebar();
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlayMenu').classList.remove('show');
            document.querySelector('.menu-circle').classList.remove('morph-circle');
        }
        function openSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlayMenu').classList.add('show');
            document.querySelector('.menu-circle').classList.add('morph-circle');
        }

        // Theme
        const themeToggleBtn = document.getElementById('themeToggle');
        let dark = localStorage.getItem('theme') === 'dark';
        function applyTheme(isDark) {
            if (isDark) document.body.classList.add('dark');
            else document.body.classList.remove('dark');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            themeToggleBtn.innerText = isDark ? '☀️' : '🌙';
        }
        applyTheme(dark);
        themeToggleBtn.addEventListener('click', () => { dark = !dark; applyTheme(dark); });

        // Menu & sidebar event
        document.getElementById('menuToggle').addEventListener('click', (e) => {
            e.stopPropagation();
            const sidebar = document.getElementById('sidebar');
            if (sidebar.classList.contains('open')) closeSidebar();
            else openSidebar();
        });
        document.getElementById('overlayMenu').addEventListener('click', closeSidebar);
        // populate sidebar
        const chapters = [
            { id: 'pendahuluan', name: '📖 Pendahuluan' },
            { id: 'bab1', name: '⚔️ Bab 1: Manajemen Risiko' },
            { id: 'bab2', name: '📊 Bab 2: Alokasi Aset' },
            { id: 'bab3', name: '⏳ Bab 3: Kekuatan Waktu' },
            { id: 'bab4', name: '🧠 Bab 4: Psikologi Investor' },
            { id: 'bab5', name: '🏛️ Bab 5: Piramida Keuangan' },
            { id: 'bab6', name: '📐 Bab 6: Implementasi' },
            { id: 'bab7', name: '🔥 Bab 7: Konsistensi' },
            { id: 'kesimpulan', name: '🎯 Kesimpulan' }
        ];
        const ul = document.getElementById('chapterList');
        chapters.forEach(ch => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = '#';
            a.innerText = ch.name;
            a.addEventListener('click', (e) => {
                e.preventDefault();
                navigateTo(ch.id, true);
                closeSidebar();
            });
            li.appendChild(a);
            ul.appendChild(li);
        });

        // start button & initial load
        document.getElementById('startBtn').addEventListener('click', () => {
            navigateTo('pendahuluan', true);
        });

        // pre-render all pages
        ['pendahuluan','bab1','bab2','bab3','bab4','bab5','bab6','bab7','kesimpulan'].forEach(p => renderPage(p));

        // handle hash navigation
        window.addEventListener('popstate', (e) => {
            let hash = window.location.hash.slice(1);
            if (hash && document.getElementById(hash)) {
                document.getElementById('homePage').classList.remove('active');
                navigateTo(hash, false);
            } else if (!hash) {
                document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                document.getElementById('homePage').classList.add('active');
            }
        });
        if (window.location.hash) {
            let hash = window.location.hash.slice(1);
            if (document.getElementById(hash)) {
                document.getElementById('homePage').classList.remove('active');
                navigateTo(hash, false);
            }
        }

        // Canvas random moving bars
        const canvas = document.getElementById('chartCanvas');
        const ctx = canvas.getContext('2d');
        let bars = [];
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initBars();
        }
        function initBars() {
            bars = [];
            let count = Math.floor(canvas.width / 45);
            for (let i = 0; i < count; i++) {
                bars.push({
                    x: i * 45 + 20,
                    height: Math.random() * canvas.height * 0.3 + 30,
                    color: Math.random() > 0.6 ? '#4C9A6F' : '#D4AF37'
                });
            }
        }
        function draw() {
            if (!ctx) return;
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.globalAlpha = 0.2;
            bars.forEach(b => {
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, canvas.height - b.height, 20, b.height);
                b.height += (Math.random() - 0.5) * 2.5;
                if (b.height > canvas.height * 0.5) b.height = canvas.height * 0.2;
                if (b.height < 20) b.height = 30;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', () => { resizeCanvas(); });
        resizeCanvas();
        draw();
    </script>
</body>
    </html>
